<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Bag - StainyCones</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-black: #111111;
            --color-white: #FFFFFF;
            --color-light-grey: #F5F5F5;
            --color-dark-grey: #333333;
            --color-whatsapp: #25D366;
            --color-error: #cc3333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--color-white); color: var(--color-black); }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        .header { padding: 20px 0; border-bottom: 1px solid var(--color-light-grey); margin-bottom: 20px; }
        .back-link { text-decoration: none; color: var(--color-black); font-weight: 600; }

        /* MIN ORDER BANNER */
        .min-order-banner {
            background-color: #fff4f4;
            color: var(--color-error);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border: 1px solid #ffebeb;
        }

        .cart-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 20px; }

        .cart-item { 
            display: flex; align-items: center; padding: 15px; 
            border: 1px solid #eee; border-radius: 15px; 
            margin-bottom: 15px; background: #fff;
        }
        .item-image { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; margin-right: 15px; }
        .item-info { flex-grow: 1; }
        .item-name { font-weight: 700; text-transform: uppercase; }
        
        /* QUANTITY NUMBERS IN GREEN */
        .qty-display { font-weight: 700; color: var(--color-whatsapp); margin: 0 10px; }
        .qty-btn { border: 1px solid #ddd; background: white; padding: 2px 10px; cursor: pointer; border-radius: 5px; font-weight: bold; }

        /* RED REMOVE BOX */
        .remove-box {
            background-color: var(--color-error);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            border: none;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .cart-summary { margin-top: 30px; padding: 20px; background: var(--color-light-grey); border-radius: 15px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 600; }
        
        /* TOTAL NUMBERS IN GREEN */
        .total-amount { color: var(--color-whatsapp); font-size: 1.3rem; font-weight: 800; }

        /* GREEN WHATSAPP BUTTON */
        .order-btn { 
            width: 100%; padding: 18px; 
            background-color: var(--color-whatsapp); 
            color: white; border: none; border-radius: 12px; 
            font-weight: 700; font-size: 1rem; cursor: pointer; 
            margin-top: 20px; text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }
        .order-btn:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; }

        .error-text { color: var(--color-error); font-size: 0.8rem; margin-top: 10px; text-align: center; display: none; }
    </style>
</head>
<body onload="renderCart()">

    <div class="container">
        <header class="header">
            <a href="index.html" class="back-link">← Continue Shopping</a>
        </header>

        <div class="min-order-banner">
            Minimum order value is ₹150/-
        </div>

        <h1 class="cart-title">Your Bag</h1>

        <div id="cart-items-container"></div>

        <div id="cart-summary-container">
            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div class="summary-row">
                    <span>Total Amount</span>
                    <span id="grand-total" class="total-amount">₹0</span>
                </div>
            </div>

            <button id="place-order-btn" class="order-btn" onclick="placeOrder()">Place Order </button>
            <p id="min-error-msg" class="error-text">Cannot place order: Minimum amount must be ₹150.</p>
        </div>
        
        <div id="empty-cart" style="display:none; text-align:center; padding:50px;">
            <p>Your bag is empty.</p>
            <a href="index.html">Go back to products</a>
        </div>
    </div>

    <script>
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('mehndiStoreCart')) || [];
            const container = document.getElementById('cart-items-container');
            const summary = document.getElementById('cart-summary-container');
            const emptyMsg = document.getElementById('empty-cart');
            const orderBtn = document.getElementById('place-order-btn');
            const errorMsg = document.getElementById('min-error-msg');

            if (cart.length === 0) {
                container.innerHTML = "";
                summary.style.display = "none";
                emptyMsg.style.display = "block";
                return;
            }

            emptyMsg.style.display = "none";
            summary.style.display = "block";
            container.innerHTML = "";
            let total = 0;

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.image}" class="item-image">
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div style="font-size:0.8rem">${item.variant}</div>
                            <div class="quantity-controls">
                                <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                                <span class="qty-display">${item.quantity}</span>
                                <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                            </div>
                            <button class="remove-box" onclick="removeItem(${index})">Remove</button>
                        </div>
                        <div style="font-weight:700">₹${itemTotal}</div>
                    </div>`;
            });

            document.getElementById('subtotal').innerText = `₹${total}`;
            document.getElementById('grand-total').innerText = `₹${total}`;

            // ORDER VALIDATION LOGIC
            if (total < 150) {
                orderBtn.disabled = true;
                errorMsg.style.display = "block";
            } else {
                orderBtn.disabled = false;
                errorMsg.style.display = "none";
            }
        }

        function updateQty(index, change) {
            let cart = JSON.parse(localStorage.getItem('mehndiStoreCart'));
            cart[index].quantity += change;
            if (cart[index].quantity < 1) cart[index].quantity = 1;
            localStorage.setItem('mehndiStoreCart', JSON.stringify(cart));
            renderCart();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('mehndiStoreCart'));
            cart.splice(index, 1);
            localStorage.setItem('mehndiStoreCart', JSON.stringify(cart));
            renderCart();
        }

        function placeOrder() {
            const cart = JSON.parse(localStorage.getItem('mehndiStoreCart'));
            let message = "New Order from Website:\n\n";
            cart.forEach(item => {
                message += `• ${item.name} (${item.variant}) x${item.quantity} = ₹${item.price * item.quantity}\n`;
            });
            message += `\nTotal: ${document.getElementById('grand-total').innerText}`;
            
            // Change to your real number
            window.open(`https://wa.me/916238562873?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
