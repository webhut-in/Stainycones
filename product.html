<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - StainyCones</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-black: #111111;
            --color-white: #FFFFFF;
            --color-light-grey: #F5F5F5;
            --color-dark-grey: #333333;
            --color-brown: #4F352A;
            /* Update this to your background filename */
            --main-bg: url('main-background.jpeg'); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-image: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.9)), var(--main-bg);
            background-attachment: fixed;
            background-size: cover;
            color: var(--color-black); 
            line-height: 1.6; 
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .header { background-color: rgba(255,255,255,0.9); padding: 15px 0; border-bottom: 1px solid var(--color-light-grey); display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
        .back-link { color: var(--color-black); text-decoration: none; font-size: 1rem; display: flex; align-items: center; margin-right: 20px; font-weight: 600; }
        .cart-link { text-decoration: none; color: var(--color-black); position: relative; margin-left: auto; }
        .cart-logo { width: 30px; height: 30px; }
        .cart-count { position: absolute; top: -8px; right: -10px; background: var(--color-black); color: white; font-size: 0.75rem; padding: 2px 6px; border-radius: 50%; }

        .product-page { display: flex; gap: 40px; margin-top: 30px; background: rgba(255,255,255,0.7); padding: 20px; border-radius: 15px; backdrop-filter: blur(10px); }
        .product-gallery { flex: 1; max-width: 50%; }
        .main-image-container { width: 100%; aspect-ratio: 1/1; overflow: hidden; border-radius: 10px; background: #eee; }
        .main-image { width: 100%; height: 100%; object-fit: cover; }

        .thumbnail-container { display: flex; gap: 10px; margin-top: 10px; overflow-x: auto; padding-bottom: 5px; }
        .thumbnail { width: 70px; height: 70px; object-fit: cover; cursor: pointer; border: 2px solid transparent; border-radius: 5px; }
        .thumbnail.active { border-color: var(--color-black); }

        .product-details { flex: 1; }
        .product-name { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; }
        .product-price { font-size: 1.5rem; color: var(--color-brown); font-weight: 700; margin-bottom: 20px; }

        .variants-section h3, .quantity-section h3 { font-size: 0.9rem; text-transform: uppercase; margin-bottom: 10px; color: var(--color-dark-grey); }
        .variant-options { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .variant-btn { padding: 10px 15px; border: 1px solid #ccc; background: white; cursor: pointer; font-family: inherit; font-size: 0.85rem; }
        .variant-btn.selected { background: var(--color-black); color: white; border-color: var(--color-black); }

        .quantity-control { display: flex; align-items: center; border: 1px solid #ccc; width: fit-content; margin-bottom: 25px; background: white; }
        .quantity-btn { padding: 10px 15px; border: none; background: none; cursor: pointer; font-size: 1.2rem; }
        .quantity-display { width: 40px; text-align: center; font-weight: 700; }

        .add-to-cart-btn { width: 100%; padding: 18px; background: var(--color-black); color: white; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .add-to-cart-btn:hover { opacity: 0.9; }

        @media (max-width: 800px) { .product-page { flex-direction: column; } .product-gallery { max-width: 100%; } }
    </style>
</head>
<body onload="initializeProduct()">

    <header class="header">
        <div class="container" style="display: flex; width: 100%; align-items: center;">
            <a href="index.html" class="back-link">← Back to Products</a>
            <a href="cart.html" class="cart-link">
                <img src="images/cart-icon.jpeg" class="cart-logo">
                <span class="cart-count" id="cart-count">0</span>
            </a>
        </div>
    </header>

    <main class="container">
        <div class="product-page">
            <div class="product-gallery">
                <div class="main-image-container">
                    <img id="main-product-image" src="" class="main-image">
                </div>
                <div class="thumbnail-container" id="thumbnail-container"></div>
            </div>
            
            <div class="product-details">
                <h1 class="product-name" id="product-name">Loading...</h1>
                <p class="product-price" id="product-price">₹0</p>

                <div class="variants-section" id="variants-section">
                    <h3>Select Option</h3>
                    <div class="variant-options" id="variant-options"></div>
                </div>

                <div class="quantity-section">
                    <h3>Quantity</h3>
                    <div class="quantity-control">
                        <button class="quantity-btn" onclick="updateQuantity(-1)">−</button>
                        <span class="quantity-display" id="product-quantity">1</span>
                        <button class="quantity-btn" onclick="updateQuantity(1)">+</button>
                    </div>
                </div>
                
                <button class="add-to-cart-btn" onclick="addToCart()">Add to bag</button>

                <div style="margin-top: 30px;">
                    <h3 style="font-size: 0.9rem; text-transform: uppercase; border-bottom: 1px solid #ddd; padding-bottom: 5px;">Description</h3>
                    <p id="product-description" style="margin-top: 10px; font-size: 0.95rem; color: #444; white-space: pre-line;"></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const productsData = [
            { id: 8, name: "ORGANIC HENNA CONES", description: "Finely strained, organic henna cones for smooth, dark staining results.WEIGHT:24g.STORAGE:6 months in freezer. ", variants: {"Per cone": 50, "30 pieces": 1050, "100 pieces": 3000}, images: ["images/hcones-image-1.jpeg", "images/hcones-image-2.jpeg","images/hcones-image-3.jpeg"] },
            { id: 7, name: "RED NAILCONES", description: "Ready-to-use red nail cones for immediate nail color application.WEIGHT:15g.STORAGE:1 Year in freezer.", variants: {"Per cone": 30, "30 pieces": 600, "100 pieces": 1850}, images: ["images/red-nailcones-1.jpeg","images/red-nailcones-2.jpeg","images/red-nailcones-3.jpeg"] },
            { id: 12, name: "MINI BRIDAL BOX", description: "Includes: 4 Organic Henna Cones, 3 Red Nailcones, Aftercare Oil, Aftercare Balm, Sealant Spray.Best for semi bridals.",variants: {"per box":390} ,images: ["images/mini-bridal-box.jpeg"]   },
            { id: 13, name: "MEGA BRIDAL BOX", description: "Includes: 6 organic henna cones, 4 Red nailcones, Aftercare OIl,Aftercare Balm,Sealant spray.", variants: {"One Box": 520}, images: ["images/mega-bridal-box.jpeg"] },
            { id: 6, name: "AFTERCARE BALM", description: "Aftercare balm to protect and enhance henna stain darkness.Use right after henna removal.SOTARAGE: 2 year in room temperature", variants: {"Per piece": 40, "30 pieces": 840, "100 pieces": 2500}, images: ["images/balm-image-1.jpeg", "images/balm-image-2.jpeg"] },
            { id: 5, name: "SEALANT SPRAY", description: "Henna sealant spray to help seal and darken your henna stain.Use right after the henna design dries.STORAGE: 6 months in freezer.", variants: {"Per piece": 40, "30 pieces": 840, "100 pieces": 2500}, images: ["images/spray-image-1.jpeg"] },
            { id: 9, name: "AFTERCARE OIL", description: "Can be stored upto 2 years in room temperature. Use to remove dried henna and darken stains.", variants: {"Per piece": 40, "30 pieces": 840, "100 pieces": 2500}, images: ["images/aftercare-oil-1.jpeg", "images/aftercare-oil-2.jpeg"] },
            { id: 14, name: "MEFIX TAPE", description: "Medical-grade Mefix tape to securely wrap and protect fresh henna.LENGTH:15cm.BREADTH:10cm.Use over dried henna.", variants: {"15cm": 45, "1m": 250}, images: ["images/mefix-tape-1.jpeg", "images/mefix-tape-2.jpeg"] },
            { id: 15, name: "BLACK HENNA", description: "Natural black henna product for  black stains.NET WEIGHT:10g.", variants: {"Per piece": 60, "50 piece": 2000, "100 piece": 3200}, images: ["images/black-henna-cone.jpeg","images/black-henna-2.jpeg"] },
            { id: 10, name: "REUSABLE PRACTICE BOOK", description: "A durable, reusable practice book for perfecting designs.",variants: {"Per book": 549},  images: ["images/practice-book-1.jpeg", "images/practice-book-2.jpeg","images/practice-book-3.jpeg","images/practice-book-4.jpeg"] },
            { id: 11, name: "ORGANIC HENNA POWDER", description: "5 times sifted,Super stringy Premium quality[Fresh crop],BAQ[Body Art Quality]Rajasthani Henna Powder.STORAGE:2 years in room temperature.", variants: {"100g": 190, "500g": 380, "1kg": 699}, images: ["images/henna-powder-1.jpeg"] },
            { id: 16, name: "TEA TREE OIL", description: "100% pure Tea Tree essential oil for henna mixing.STORAGE:2 years in room temperature.", variants: {"30ml": 200, "100ml": 560, "500ml": 1850, "1L": 3499}, images: ["images/tea-tree-oil.jpeg"] },
            { id: 17, name: "EUCALYPTUS OIL", description: "100% pure Eucalyptus Globulus essential oil.STORAGE: 2 years in room temperature.", variants: {"30ml": 160, "100ml": 420, "500ml": 1460, "1L": 2110}, images: ["images/eucalyptus-oil.jpeg"] },
            { id: 18, name: "BEGINNERS EUCALYPTUS KIT", description: "Contains: 100g Henna powder,30ml Eucalyptus oil, piping bag,Cellophane sheet and Recipe card.", variants: {"100g Kit": 370, "500g Kit": 1100, "1kg Kit": 1999}, images: ["images/beginners-eucalyptus-kit.jpeg"] },
            { id: 19, name: "BEGINNERS TEA TREE KIT", description: "Contains: 100g henna powder,30ml Tea tree oil,piping bag,Cellophane sheet and Recipe card.", variants: {"100g Kit": 410, "500g Kit": 1340, "1kg Kit": 2240}, images: ["images/beginners-teatree-kit.jpeg"] },
            { id: 21, name: "DIY NAILCONE KIT", description: "Contains: 100ml Nail liquid,Mixing powder,Cellophane sheet and Piping bag.", variants: {"100ml": 199, "500ml": 850, "1L": 1690}, images: ["images/diy-nailcone-kit.jpeg"] },
            { id: 20, name: "HENNA PASTE", description: "Pre-mixed and strained ready-to-use henna paste.STORAGE: 6 months in freezer.", variants: {"500g": 500, "1KG": 980}, images: ["images/henna-paste.jpeg"] },
            { id: 4, name: "NAIL LIQUID", description: "Professional-grade nail liquid for deep color.", variants: {"30ml": 60, "100ml": 180, "1L": 1499}, images: ["images/liquid-image-1.jpeg"] },
            { id: 2, name: "HERBAL HAIR OIL", description: "Nourishing herbal hair oil for hair health.Prevents dandruff,Pre-mature greying and promotes hair growth", variants: {"100ml": 100, "300ml": 280, "500ml": 480, "1L": 950}, images: ["images/oil-image-1.jpeg"] },
            { id: 3, name: "EMPTY CONES", description: "Ready to fill empty cones for filling.", variants: {"Per piece": 5,"Pack of 10": 50, "Pack of 50": 200}, images: ["cones-image-1.jpeg"] },
            { id: 22, name: "NAIL PASTE", description: "Ready to use Premium nail henna paste for a deep, long-lasting stain.", variants: {"250g": 350,"500g":675, "1kg": 1299}, images: ["images/nail-paste-image.jpeg"] }
        ];

        let currentProduct = null;
        let selectedVariantName = "";
        let currentQuantity = 1;

        function initializeProduct() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            currentProduct = productsData.find(p => p.id === id);

            if (!currentProduct) {
                document.body.innerHTML = "<div class='container'><h1>Product Not Found</h1><a href='index.html'>Go Back to Shop</a></div>";
                return;
            }

            document.getElementById('product-name').innerText = currentProduct.name;
            document.getElementById('product-description').innerText = currentProduct.description;
            
            // Image Setup
            const mainImg = document.getElementById('main-product-image');
            mainImg.src = currentProduct.images[0];
            const thumbContainer = document.getElementById('thumbnail-container');
            currentProduct.images.forEach((img, idx) => {
                const thumb = document.createElement('img');
                thumb.src = img;
                thumb.className = `thumbnail ${idx === 0 ? 'active' : ''}`;
                thumb.onclick = () => {
                    mainImg.src = img;
                    document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                };
                thumbContainer.appendChild(thumb);
            });

            // Variant Setup
            const variantContainer = document.getElementById('variant-options');
            const names = Object.keys(currentProduct.variants);
            if (names.length > 0) {
                selectedVariantName = names[0];
                names.forEach(name => {
                    const btn = document.createElement('button');
                    btn.innerText = name;
                    btn.className = `variant-btn ${name === selectedVariantName ? 'selected' : ''}`;
                    btn.onclick = () => {
                        selectedVariantName = name;
                        document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        updatePrice();
                    };
                    variantContainer.appendChild(btn);
                });
            } else {
                document.getElementById('variants-section').style.display = 'none';
                selectedVariantName = "Default";
            }

            updatePrice();
            updateCartDisplay();
        }

        function updatePrice() {
            const price = currentProduct.variants[selectedVariantName] || 0;
            document.getElementById('product-price').innerText = `₹${price}`;
        }

        function updateQuantity(delta) {
            currentQuantity += delta;
            if (currentQuantity < 1) currentQuantity = 1;
            document.getElementById('product-quantity').innerText = currentQuantity;
        }

        function updateCartDisplay() {
            const cart = JSON.parse(localStorage.getItem('mehndiStoreCart')) || [];
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').innerText = count;
        }

        function addToCart() {
            const cart = JSON.parse(localStorage.getItem('mehndiStoreCart')) || [];
            const price = currentProduct.variants[selectedVariantName] || 0;
            
            const existing = cart.find(item => item.id === currentProduct.id && item.variant === selectedVariantName);
            
            if (existing) {
                existing.quantity += currentQuantity;
            } else {
                cart.push({
                    id: currentProduct.id,
                    name: currentProduct.name,
                    price: price,
                    variant: selectedVariantName,
                    quantity: currentQuantity,
                    image: currentProduct.images[0]
                });
            }

            localStorage.setItem('mehndiStoreCart', JSON.stringify(cart));
            updateCartDisplay();
            alert(`${currentQuantity} item(s) added to bag!`);
        }
    </script>
</body>
</html>
